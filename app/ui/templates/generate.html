{% extends "base.html" %}

{% block content %}
<h1>Generate Landing Page</h1>

<form method="POST" action="/ui/generate">
  <div class="form-group">
    <label for="product_idea">Product Idea</label>
    <textarea
      id="product_idea"
      name="product_idea"
      required
      placeholder="Describe your product idea..."
    ></textarea>
  </div>

  <div class="form-group">
    <label for="target_audience">Target Audience</label>
    <input
      type="text"
      id="target_audience"
      name="target_audience"
      required
      placeholder="e.g., busy professionals aged 25-40"
    >
  </div>

  <div class="form-group">
    <label for="color_preference">Color Preference</label>
    <select id="color_preference" name="color_preference">
      <option value="extract">Auto (extract from research)</option>
      <option value="research" selected>Research-based</option>
      <option value="preset">Preset</option>
    </select>
  </div>

  <div class="form-group form-check">
    <input type="checkbox" id="mock" name="mock" checked>
    <label for="mock">Use mock data (no API calls)</label>
  </div>

  <button type="submit" class="btn">Generate Landing Page</button>
</form>
{% endblock %}
