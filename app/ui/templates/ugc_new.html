{% extends "base.html" %}

{% block content %}
<h1>New UGC Job</h1>

<form method="POST" action="/ugc/jobs" enctype="multipart/form-data">

  <div class="form-group">
    <label for="product_name">Product Name</label>
    <input type="text" id="product_name" name="product_name" required placeholder="e.g., AeroGlide Running Shoes">
  </div>

  <div class="form-group">
    <label for="description">Description</label>
    <textarea id="description" name="description" required placeholder="Describe the product and what makes it unique..."></textarea>
  </div>

  <div class="form-group">
    <label for="product_url">Product URL (optional)</label>
    <input type="text" id="product_url" name="product_url" placeholder="https://example.com/product">
  </div>

  <div class="form-group">
    <label for="target_duration">Target Duration (seconds)</label>
    <input type="number" id="target_duration" name="target_duration" value="30" min="10" max="120">
  </div>

  <div class="form-group">
    <label for="style_preference">Style Preference (optional)</label>
    <input type="text" id="style_preference" name="style_preference" placeholder="e.g., energetic, lifestyle, testimonial">
  </div>

  <div class="form-group">
    <label for="images">Product Images (optional)</label>
    <input type="file" id="images" name="images" multiple accept="image/*">
  </div>

  <!-- Mock toggle: hidden sends "false" when unchecked, checkbox overrides with "true" when checked -->
  <div class="form-group form-check">
    <input type="hidden" name="use_mock" value="false">
    <input type="checkbox" id="use_mock" name="use_mock" value="true" checked>
    <label for="use_mock">Use mock data (no API calls)</label>
  </div>

  <button type="submit" class="btn btn-primary">Start UGC Job</button>
</form>

<script>
document.querySelector("form").addEventListener("submit", function(e) {
  e.preventDefault();
  var fd = new FormData(this);
  fetch("/ugc/jobs", { method: "POST", body: fd })
    .then(function(r) { return r.json(); })
    .then(function(data) { window.location.href = "/ui/ugc/" + data.job_id + "/review"; })
    .catch(function(err) { alert("Error: " + err.message); });
});
</script>
{% endblock %}
